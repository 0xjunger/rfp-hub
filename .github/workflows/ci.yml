name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx turbo build --filter='./packages/*' --filter=@rfp-hub/docs
      - run: npx turbo typecheck
      - run: npx turbo lint

  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: rfphub
          POSTGRES_PASSWORD: rfphub
          POSTGRES_DB: rfphub_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://rfphub:rfphub@localhost:5432/rfphub_test
      REDIS_URL: redis://localhost:6379
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx turbo build --filter='./packages/*'
      - name: Push DB schema and extensions
        run: |
          cd packages/db && npx drizzle-kit push --force
          cd ../..
          sudo apt-get install -y -qq postgresql-client > /dev/null
          PGPASSWORD=rfphub psql -h localhost -U rfphub -d rfphub_test -f data/init.sql
      - run: npx turbo test
